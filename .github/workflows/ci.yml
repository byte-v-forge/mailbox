name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      GONOSUMDB: github.com/byte-v-forge/*
    steps:
      - name: Checkout service
        uses: actions/checkout@v6.0.2
        with:
          path: mailbox

      - name: Checkout contracts
        uses: actions/checkout@v6.0.2
        with:
          repository: byte-v-forge/contracts
          path: contracts

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: mailbox/go.mod
          cache: true
          cache-dependency-path: mailbox/go.sum

      - name: Setup protoc
        uses: arduino/setup-protoc@v3.0.0

      - name: Install protobuf plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.2

      - name: Generate proto
        working-directory: mailbox
        run: sh scripts/generate-proto.sh

      - name: Test
        working-directory: mailbox
        run: go test ./...

      - name: Vet
        working-directory: mailbox
        run: go vet ./...
