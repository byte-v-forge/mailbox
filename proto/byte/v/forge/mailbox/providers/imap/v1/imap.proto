syntax = "proto3";

package byte.v.forge.mailbox.providers.imap.v1;

import "byte/v/forge/contracts/mailbox/v1/message.proto";
import "byte/v/forge/contracts/mailbox/v1/service.proto";
import "byte/v/forge/mailbox/internal/v1/mailbox_internal.proto";

option csharp_namespace = "ByteVForge.Mailbox.Providers.Imap.V1";
option go_package = "github.com/byte-v-forge/mailbox/gen/go/byte/v/forge/mailbox/providers/imap/v1;imapv1";
option java_multiple_files = true;
option java_outer_classname = "ImapProto";
option java_package = "com.bytevforge.mailbox.providers.imap.v1";
option php_namespace = "ByteVForge\\Mailbox\\Providers\\Imap\\V1";

enum ImapSecurityMode {
  IMAP_SECURITY_MODE_UNSPECIFIED = 0;
  IMAP_SECURITY_MODE_IMPLICIT_TLS = 1;
  IMAP_SECURITY_MODE_STARTTLS = 2;
}

message ImapProviderConfig {
  byte.v.forge.mailbox.internal.v1.MailboxProviderConfig config = 1;
  string host = 2;
  int32 port = 3;
  ImapSecurityMode security_mode = 4;
  string username = 5;
  string credential_secret_ref = 6;
}

message ImapFolderIdentity {
  string mailbox_name = 1;
  uint64 uid_validity = 2;
  uint64 uid_next = 3;
}

message ImapMessageIdentity {
  string mailbox_name = 1;
  uint64 uid = 2;
  uint64 uid_validity = 3;
  uint64 mod_seq = 4;
}

message ImapSearchRequest {
  string account_id = 1;
  string mailbox_name = 2;
  byte.v.forge.contracts.mailbox.v1.MessageSearchCriteria criteria = 3;
}

message ImapFetchMessageRequest {
  ImapMessageIdentity identity = 1;
  bool include_body = 2;
  bool include_headers = 3;
}

message ImapMessage {
  byte.v.forge.contracts.mailbox.v1.EmailMessage public_message = 1;
  ImapMessageIdentity identity = 2;
  repeated string raw_flags = 3;
}
