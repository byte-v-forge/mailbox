syntax = "proto3";

package byte.v.forge.mailbox.providers.jmap.v1;

import "byte/v/forge/contracts/mailbox/v1/message.proto";
import "byte/v/forge/contracts/mailbox/v1/service.proto";
import "byte/v/forge/mailbox/internal/v1/mailbox_internal.proto";

option csharp_namespace = "ByteVForge.Mailbox.Providers.Jmap.V1";
option go_package = "github.com/byte-v-forge/mailbox/gen/go/byte/v/forge/mailbox/providers/jmap/v1;jmapv1";
option java_multiple_files = true;
option java_outer_classname = "JmapProto";
option java_package = "com.bytevforge.mailbox.providers.jmap.v1";
option php_namespace = "ByteVForge\\Mailbox\\Providers\\Jmap\\V1";

message JmapProviderConfig {
  byte.v.forge.mailbox.internal.v1.MailboxProviderConfig config = 1;
  string session_endpoint = 2;
  string account_id = 3;
  string credential_secret_ref = 4;
}

message JmapMailboxIdentity {
  string account_id = 1;
  string mailbox_id = 2;
  string role = 3;
}

message JmapEmailIdentity {
  string account_id = 1;
  string email_id = 2;
  string thread_id = 3;
  string blob_id = 4;
}

message JmapEmail {
  byte.v.forge.contracts.mailbox.v1.EmailMessage public_message = 1;
  JmapEmailIdentity identity = 2;
  repeated string keywords = 3;
  repeated string mailbox_ids = 4;
}

message JmapEmailQueryRequest {
  string account_id = 1;
  byte.v.forge.contracts.mailbox.v1.MessageSearchCriteria criteria = 2;
  int32 limit = 3;
  string position = 4;
}
