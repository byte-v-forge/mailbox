syntax = "proto3";

package mailbox;

import "email.proto";
import "byte/v/forge/contracts/mailbox/v1/mailbox.proto";

option go_package = "./;pb";

service MailboxService {
  rpc ListMailboxes(email.ListEmailMailboxesRequest) returns (email.ListEmailMailboxesResponse);
  rpc UpsertMailbox(email.UpsertEmailMailboxRequest) returns (email.UpsertEmailMailboxResponse);
  rpc DeleteMailbox(email.DeleteMailboxRequest) returns (email.DeleteMailboxResponse);
  rpc WaitForMailboxEmail(byte.v.forge.contracts.mailbox.v1.WaitForMailboxEmailRequest) returns (byte.v.forge.contracts.mailbox.v1.WaitForMailboxEmailResponse);
  rpc ListMailboxDomains(byte.v.forge.contracts.mailbox.v1.ListMailboxDomainsRequest) returns (byte.v.forge.contracts.mailbox.v1.ListMailboxDomainsResponse);
  rpc SyncMailboxDomains(byte.v.forge.contracts.mailbox.v1.SyncMailboxDomainsRequest) returns (byte.v.forge.contracts.mailbox.v1.SyncMailboxDomainsResponse);
  rpc ListMailboxProviderCapabilities(byte.v.forge.contracts.mailbox.v1.ListMailboxProviderCapabilitiesRequest) returns (byte.v.forge.contracts.mailbox.v1.ListMailboxProviderCapabilitiesResponse);
  rpc RegisterMailbox(byte.v.forge.contracts.mailbox.v1.RegisterMailboxRequest) returns (byte.v.forge.contracts.mailbox.v1.RegisterMailboxResponse);
  rpc RunMailboxOAuth(byte.v.forge.contracts.mailbox.v1.StartMailboxOAuthRequest) returns (byte.v.forge.contracts.mailbox.v1.StartMailboxOAuthResponse);
  rpc ListMailboxInbox(byte.v.forge.contracts.mailbox.v1.ListMailboxInboxRequest) returns (byte.v.forge.contracts.mailbox.v1.ListMailboxInboxResponse);
  rpc FetchMailboxInboxes(byte.v.forge.contracts.mailbox.v1.FetchMailboxInboxesRequest) returns (byte.v.forge.contracts.mailbox.v1.FetchMailboxInboxesResponse);
  rpc GetMailboxOperation(byte.v.forge.contracts.mailbox.v1.GetMailboxOperationRequest) returns (byte.v.forge.contracts.mailbox.v1.GetMailboxOperationResponse);
  rpc ListMailboxOperations(byte.v.forge.contracts.mailbox.v1.ListMailboxOperationsRequest) returns (byte.v.forge.contracts.mailbox.v1.ListMailboxOperationsResponse);
}

message CloudflareEmailZone {
  string zone_id = 1;
  string zone_name = 2;
  optional bool enabled = 3;
  string worker_name = 4;
  optional bool catch_all_enabled = 5;
  reserved 6;
  reserved "domains";
}

message CloudflareEmailConfig {
  repeated CloudflareEmailZone zones = 1;
  string api_base_url = 2;
}

message MailboxRegistrationOperationRequest {
  string operation_id = 1;
}

message MailboxOAuthOperationRequest {
  string operation_id = 1;
}

message MailboxInboxFetchRequest {
  string operation_id = 1;
  byte.v.forge.contracts.mailbox.v1.FetchMailboxInboxesRequest request = 2;
}
